# Railway config-as-code: https://docs.railway.com/guides/config-as-code
# Deploy from this repository root so `app` is importable as the `app` package.

[build]
builder = "NIXPACKS"
# Install Python deps + Playwright browser. Linux system deps are handled via apt packages below.
buildCommand = "pip install -r requirements.txt && python -m playwright install chromium"

# Nixpacks: ensure system libraries Chromium needs exist.
# (Install list is intentionally a bit broad to avoid runtime missing-lib crashes.)
nixpacksPlan.providers = ["python"]
nixpacksPlan.phases.setup.aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libatk-bridge2.0-0",
  "libatk1.0-0",
  "libdrm2",
  "libgbm1",
  "libasound2",
  "libx11-6",
  "libxext6",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxrandr2",
  "libxshmfence1",
  "libpango-1.0-0",
  "libcairo2",
  "libgtk-3-0",
  "ca-certificates",
  "fonts-liberation",
  "fontconfig",
]

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
