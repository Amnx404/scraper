# Railway config-as-code: https://docs.railway.com/guides/config-as-code
# Deploy from this repository root so `app` is importable as the `app` package.

[build]
builder = "RAILPACK"
buildCommand = "pip install -r requirements.txt"

[deploy]
# Recommended: create TWO Railway services from this repo:
# - Web service:   startCommand = "./scripts/railway/web.sh"
# - Worker service startCommand = "./scripts/railway/worker.sh"
#
# Single-service option (not recommended):
# - Web+Worker: startCommand = "./scripts/railway/all-in-one.sh"
startCommand = "./scripts/railway/web.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
