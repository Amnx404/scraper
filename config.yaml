# Crawl entry points (where to start)
seed_urls:
  - https://roboracer.ai/

# Allowed URL scopes (used only when respect_allowed_prefixes=true)
allowed_prefixes:
  - https://f1tenth-coursekit.readthedocs.io/
  - https://roboracer.ai/
  - https://ahmadamine998.github.io/ESE6150-Website/

respect_allowed_prefixes: true  # false = crawl every discovered link

output_dir: output1
page_output_subdir: pages
global_status_filename: crawl_status.jsonl
max_pages: 500
delay: 2          # seconds between requests
user_agent: roboracer-self-scraper/1.0

use_selenium: true
selenium_page_load_timeout: 20
selenium_render_wait: 1
parallel_workers: 0
retry_limit: 2

# Queue filters:
# - keep all discovered URLs in page JSON "links"
# - only queue URLs that pass these filters

url_whitelist_patterns:
  - "*"
url_blacklist_patterns:
  - "mailto:*"
  - "tel:*"
  - "javascript:*"
  - "*.css*"
  - "*.js*"
  - "*.svg*"
  - "*.png*"
  - "*.jpg*"
  - "*.jpeg*"
  - "*.gif*"
  - "*.webp*"
  - "*.ico*"
  - "*.pdf*"
  - "*.zip*"
  - "*.woff*"
  - "*.woff2*"
  - "*.ttf*"
  - "*.eot*"
